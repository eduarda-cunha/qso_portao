<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entradas e Serviços</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚚</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f5f5f5; margin: 0; }
        
        nav { 
            background-color: #000; 
            color: #fff; 
            padding: 10px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 3px solid #FFD700; /* Linha Amarela */
        }
        .logo { font-weight: bold; color: #FFD700; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: #FFD700; }
        .user-tag { background: #333; padding: 5px 12px; border-radius: 20px; color: #FFD700; font-size: 12px; }
        .link-sair { color: #ff4d4d !important; font-weight: bold; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .titulo-caminhao::before { content: "🚚 "; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">🚚 Entradas e Serviços</a>
        <div class="nav-links">
            {% if session.get('usuario') %}
            <span class="user-tag">👤 {{ session['usuario'] }}</span>
            <a href="/">Início</a>
            <a href="/gestor">Gestor</a>
            <a href="/logout" class="link-sair">Sair</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
