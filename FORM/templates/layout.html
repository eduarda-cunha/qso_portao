<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Praia Clube</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚚</text></svg>">
    <style>
        :root { --amarelo: #FFD700; --preto: #000; --fundo: #f4f4f4; --verde: #2e7d32; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--fundo); }
        .navbar { background: var(--preto); color: var(--amarelo); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--amarelo); }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 1100px; }
        
        .btn { 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            text-decoration: none; 
            display: inline-block; 
            border: none;
            transition: 0.3s;
        }
        .btn-novo { background: var(--verde); color: white; }
        .btn-novo:hover { background: #1b5e20; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div><strong>Portão Praia</strong></div>
        <div class="nav-links">
            <span style="font-size: 12px;">👤 {{ session['usuario'] }}</span>
            <a href="/">Início</a>
            <a href="/logout" style="color: #ff4d4d;">Sair</a>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
